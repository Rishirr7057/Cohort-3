<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete HTMl</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        body,html{
            height:100%;
            width: 100%;
        }
        #heading{
            text-align: center;
            color:beige;
            background-color: lightblue;
            font-family: lucy;
            font-weight: 100;
            font-size:larger;

        }
        .heading{
            width: 100%;
            background-color: aliceblue;
            text-align: center;
        }
        .heading *{
            margin:5px;
        }
        @font-face {
            font-family: lucy;
            src: url('./fonts/NeueMachina-Regular.woff2');
        }
    </style>
</head>
<body>
    <div class="heading">
    <h1 id="heading">Heading in HTML Note- all Headings are block-line element it cover entire width defaultly</h1>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>
    </div>
</body>
</html>
